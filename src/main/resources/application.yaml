spring:
  application:
    name: inventoryService
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak issuer(realm 베이스 — '/protocol/openid-connect/certs' 붙이지 말 것). issuer-uri는 첫 토큰 검증 시
          # OIDC 디스커버리(.well-known/openid-configuration)로 jwks_uri·issuer를 받는다(지연, 기동 시 호출 없음).
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://auth.erp007.xyz/realms/master}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventory}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        # ddl-auto=create/create-drop로 스키마를 새로 만든 직후 import.sql을 1회 실행(로컬 시드). update/validate에선 미실행.
        hbm2ddl:
          import_files: /import.sql
          import_files_sql_extractor: org.hibernate.tool.schema.internal.script.MultiLineSqlScriptExtractor
          charset_name: UTF-8
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # relay가 "브로커 수신 확정(publisher confirm ack)" 후에만 outbox status=PUBLISHED로 전환하도록 confirm 사용
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        # 비즈니스/DB 반영 + 결과 outbox 커밋 후 수동 ack (Slice 3 리스너에서 사용)
        acknowledge-mode: manual
        # 거부(nack)된 메시지는 재큐하지 않고 DLX로 보낸다
        default-requeue-rejected: false

springdoc:
  api-docs:
    path: /inventory/v3/api-docs
  swagger-ui:
    path: /inventory/swagger-ui.html

# Item 서비스 연동(상세 패널 대분류·중분류). enabled=false면 호출하지 않고 카테고리는 null로 강등한다(Item 미배포 동안 기본값).
# 배포 후 ITEM_INTEGRATION_ENABLED=true + ITEM_BASE_URL 설정으로 전환한다.
# connect/read 타임아웃(ms): Item 지연 시 호출 스레드 무한 블로킹 방지. 초과 시 503(ITEM_SERVICE_UNAVAILABLE)으로 번역된다.
item:
  integration:
    enabled: ${ITEM_INTEGRATION_ENABLED:false}
  base-url: ${ITEM_BASE_URL:}
  connect-timeout-ms: ${ITEM_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${ITEM_READ_TIMEOUT_MS:3000}

# RabbitMQ 비동기 연계 토글. true면 토폴로지 선언 + (Slice 2/3) relay·listener 활성. false(기본)면 기존 동기 컨트롤러만 동작한다.
inventory:
  messaging:
    async-enabled: ${INVENTORY_MESSAGING_ASYNC_ENABLED:false}
    relay:
      poll-interval-ms: ${INVENTORY_MESSAGING_RELAY_POLL_INTERVAL_MS:5000}
      batch-size: ${INVENTORY_MESSAGING_RELAY_BATCH_SIZE:100}
      confirm-timeout-ms: ${INVENTORY_MESSAGING_RELAY_CONFIRM_TIMEOUT_MS:5000}